<!DOCTYPE html>
<html>
<head>
    <title>Sohani - Web Developer</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: white;
            backdrop-filter: blur(10px);
        }
        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid white;
            margin: 0 auto 20px auto;
            display: block;
            object-fit: cover;
        }
        h1 { margin: 0 0 10px 0; font-size: 2.5em; }
        p { margin: 10px 0; opacity: 0.9; }
        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 25px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="sohani.jpg" alt="Sohani Kumari" class="profile-pic">
        <h1>👑 Sohani Kumari</h1>
        <p>Self-Taught Developer | Patna, Bihar</p>
        <p>Turning Ideas Into Websites</p>
        <p>From 404 Error to First Website</p>
        <a href="https://github.com/codewithsohani-byte" class="btn">GitHub</a>
        <a href="#" class="btn">Instagram</a>
    </div>
</body>
</html>
