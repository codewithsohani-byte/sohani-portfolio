<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sohani - Developer</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
    }
    h1 {
      font-size: 3rem;
      margin: 0 0 10px 0;
      text-shadow: 0 0 20px rgba(255,255,255,0.8);
    }
    p {
      font-size: 1.2rem;
      opacity: 0.9;
    }
    .badge {
      background: #00ff88;
      color: #000;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: bold;
      display: inline-block;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>👑 Sohani</h1>
    <p>404 Ko Maar Diya 💥</p>
    <p>Developer From Patna 🐯</p>
    <div class="badge">₹2100 Bacha Liye ✅</div>
  </div>
</body>
</html>
